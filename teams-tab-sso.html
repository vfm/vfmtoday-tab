<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vfm Today</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #c8c6c4; background: #1f1f1f; }
        iframe { width: 100%; height: 100%; border: none; }
        #status {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; width: 100%; height: 100%; gap: 16px;
            padding: 24px; text-align: center;
        }
        #status .title { font-size: 20px; font-weight: 600; color: #e1dfdd; }
        #status .msg { font-size: 14px; color: #999; }
        #status .error { color: #f85149; }
        #status .btn {
            display: none; padding: 12px 32px; background: #0078d4;
            color: #fff; border: none; border-radius: 6px; font-size: 16px;
            text-decoration: none; cursor: pointer;
        }
        #status .btn:hover { background: #106ebe; }
        #status .btn-secondary {
            display: none; padding: 10px 24px; background: transparent;
            color: #0078d4; border: 1px solid #0078d4; border-radius: 6px;
            font-size: 14px; text-decoration: none; cursor: pointer;
        }
        #status .debug { font-size: 11px; color: #666; max-width: 90%; word-break: break-all; }
    </style>
</head>
<body>
    <!-- Status-Anzeige während Authentifizierung -->
    <div id="status">
        <div class="title">vfm Today Kalender</div>
        <div class="msg" id="status-msg">Authentifizierung läuft…</div>
        <a class="btn" id="retry-btn" href="#">Erneut versuchen</a>
        <a class="btn-secondary" id="browser-btn" href="#">Im Browser öffnen</a>
        <div class="debug" id="debug-msg"></div>
    </div>

    <!-- Kalender-iFrame (wird nach erfolgreicher Auth sichtbar) -->
    <iframe id="content" style="display:none;"></iframe>

    <script src="https://res.cdn.office.net/teams-js/2.24.0/js/MicrosoftTeams.min.js"></script>
    <script>
        (function () {
            // ── Konfiguration ──────────────────────────────────────────
            var PROXY_BASE = 'https://vfmtoday-proxy.azurewebsites.net/api/proxy';
            var CALENDAR_URL = 'https://vfmtoday.vfm.de/kalender';
            var RELOAD_MS  = 60 * 60 * 1000; // 1 Stunde

            var iframe     = document.getElementById('content');
            var statusDiv  = document.getElementById('status');
            var statusMsg  = document.getElementById('status-msg');
            var retryBtn   = document.getElementById('retry-btn');
            var browserBtn = document.getElementById('browser-btn');
            var debugMsg   = document.getElementById('debug-msg');
            var notified   = false;

            function ensureNotify() {
                if (notified) return;
                notified = true;
                try { microsoftTeams.app.notifySuccess(); } catch (e) {}
            }

            function debug(msg) {
                console.log('[vfmtoday] ' + msg);
                debugMsg.textContent = msg;
            }

            function showError(msg) {
                statusMsg.textContent = msg;
                statusMsg.classList.add('error');
                retryBtn.style.display = 'inline-block';
                browserBtn.style.display = 'inline-block';
            }

            function showStatus(msg) {
                statusMsg.textContent = msg;
                statusMsg.classList.remove('error');
            }

            /** Fallback: im System-Browser öffnen */
            function openInBrowser() {
                try {
                    microsoftTeams.app.openLink(CALENDAR_URL);
                } catch (e) {
                    window.open(CALENDAR_URL, '_blank');
                }
            }

            /** Holt SSO-Token und lädt Kalender über den Proxy */
            function loadViaProxy() {
                showStatus('Authentifizierung läuft…');
                retryBtn.style.display = 'none';
                browserBtn.style.display = 'none';
                debug('getAuthToken...');

                microsoftTeams.authentication.getAuthToken().then(function (token) {
                    debug('Token erhalten, lade Proxy...');
                    showStatus('Kalender wird geladen…');

                    return fetch(PROXY_BASE, {
                        method: 'GET',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                        },
                    });
                }).then(function (resp) {
                    debug('Proxy Status: ' + resp.status);
                    if (!resp.ok) {
                        return resp.text().then(function (txt) {
                            var errMsg = 'HTTP ' + resp.status;
                            try { errMsg = JSON.parse(txt).error || errMsg; } catch(e) {}
                            throw new Error(errMsg);
                        });
                    }
                    return resp.text();
                }).then(function (html) {
                    debug('HTML empfangen: ' + html.length + ' Zeichen');
                    // HTML in den iframe schreiben
                    statusDiv.style.display = 'none';
                    iframe.style.display = 'block';
                    iframe.srcdoc = html;
                }).catch(function (err) {
                    console.error('Proxy load failed:', err);
                    debug('Fehler: ' + (err.message || JSON.stringify(err)));
                    showError('Fehler: ' + (err.message || err));
                });
            }

            // Retry-Button
            retryBtn.addEventListener('click', function (e) {
                e.preventDefault();
                loadViaProxy();
            });

            // Browser-Fallback-Button
            browserBtn.addEventListener('click', function (e) {
                e.preventDefault();
                openInBrowser();
            });

            // Auto-Reload
            setInterval(function () {
                if (iframe.style.display !== 'none') {
                    loadViaProxy();
                }
            }, RELOAD_MS);

            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible' && iframe.style.display !== 'none') {
                    loadViaProxy();
                }
            });

            // Sicherheits-Timeout: notifySuccess nach 2s
            setTimeout(ensureNotify, 2000);

            /** Nicht-Windows: "Im Browser öffnen"-Button zeigen */
            function showBrowserFallback(platform) {
                ensureNotify();
                showStatus('Tippe auf den Button, um den Kalender zu öffnen.');
                browserBtn.style.display = 'inline-block';
                browserBtn.textContent = 'Kalender öffnen';
                // Primär-Style für den Button
                browserBtn.style.background = '#0078d4';
                browserBtn.style.color = '#fff';
                browserBtn.style.border = 'none';
                browserBtn.style.padding = '12px 32px';
                browserBtn.style.fontSize = '16px';
                debug(platform + ' – Browser-Fallback');
            }

            /**
             * Plattform-Routing:
             * - Windows Desktop: SSO Proxy (WebView2 teilt Cookies mit Edge)
             * - Web-Browser: SSO Proxy (Browser hat Entra Session-Cookie)
             * - macOS / iOS / Android: Browser-Button (kein Cookie-Sharing)
             */
            function routeByPlatform() {
                microsoftTeams.app.getContext().then(function (context) {
                    var clientType = context.app.host.clientType || '';
                    var isWindows = /Windows/i.test(navigator.userAgent);
                    debug('clientType=' + clientType + ', isWindows=' + isWindows);

                    if (clientType === 'web') {
                        // Browser-Client: hat wahrscheinlich Entra Session
                        loadViaProxy();
                    } else if (clientType === 'desktop' && isWindows) {
                        // Windows Desktop: WebView2 teilt Cookies mit Edge
                        loadViaProxy();
                    } else {
                        // macOS Desktop, iOS, Android, iPadOS: kein Cookie-Sharing
                        showBrowserFallback(clientType + (isWindows ? '/Win' : '/nonWin'));
                    }
                }).catch(function (err) {
                    debug('getContext Fehler: ' + err.message);
                    // Fallback: User-Agent prüfen
                    if (/Windows/i.test(navigator.userAgent)) {
                        loadViaProxy();
                    } else {
                        showBrowserFallback('UA-fallback');
                    }
                });
            }

            // ── SDK initialisieren und Kalender laden ──────────────────
            debug('SDK initialize...');
            microsoftTeams.app.initialize().then(function () {
                debug('SDK bereit');
                ensureNotify();
                routeByPlatform();
            }).catch(function (err) {
                debug('SDK Fehler: ' + (err.message || err));
                ensureNotify();
                showError('Teams SDK Fehler: ' + (err.message || err));
            });
        })();
    </script>
</body>
</html>
