<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vfm Today</title>
    <script>
        // Sofort-Erkennung: Echtes Mobilgerät (iPhone / Android-Handy)?
        // macOS Desktop wird wie Windows behandelt (iframe-Ansatz).
        var _isMobile = (function () {
            var ua = navigator.userAgent || '';
            return /iPhone|Android.*Mobile/i.test(ua);
        })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        #mobile-hint {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #323130;
            text-align: center;
            gap: 16px;
            padding: 24px;
        }
        #mobile-hint .title {
            font-size: 18px;
            font-weight: 600;
        }
        #mobile-hint .open-btn {
            display: inline-block;
            padding: 12px 32px;
            background: #0078d4;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
        }
        #mobile-hint .open-btn:hover { background: #106ebe; }
        #login-hint {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 1px solid #e1dfdd;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
            padding: 16px 24px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #323130;
            text-align: center;
            z-index: 100;
            max-width: 400px;
        }
        #login-hint a {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 24px;
            background: #0078d4;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }
        #login-hint a:hover { background: #106ebe; }
        #login-hint .dismiss {
            display: inline-block;
            margin-top: 8px;
            margin-left: 12px;
            padding: 8px 16px;
            background: transparent;
            color: #666;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Kalender-iFrame (nur auf Windows Desktop) -->
    <iframe id="content" sandbox="allow-scripts allow-same-origin allow-forms" style="display:none;"></iframe>

    <!-- Mobile/macOS: Kalender per Dialog oder Browser -->
    <div id="mobile-hint">
        <div class="title">vfm Today Kalender</div>
        <a class="open-btn" id="open-dialog-btn" href="#">Kalender anzeigen</a>
        <div style="margin-top:8px;font-size:13px;color:#666;">oder <a id="open-browser-btn" href="#" style="color:#0078d4;">im Browser öffnen</a></div>
    </div>

    <!-- Desktop: Anmelde-Hinweis (nur bei Bedarf sichtbar) -->
    <div id="login-hint">
        <div>Falls der Kalender nicht angezeigt wird, bitte einmalig anmelden:</div>
        <a id="login-btn" href="#" target="_blank">Anmelden</a>
        <a class="dismiss" id="dismiss-btn" href="#">Ausblenden</a>
    </div>

    <script src="https://res.cdn.office.net/teams-js/2.24.0/js/MicrosoftTeams.min.js"></script>
    <script>
        (function () {
            var RELOAD_INTERVAL_MS = 60 * 60 * 1000; // 1 Stunde
            var TARGET_URL  = 'https://vfmtoday.vfm.de/kalender';
            var HINT_DELAY  = 4000; // Nach 4s Hinweis zeigen

            var iframe      = document.getElementById('content');
            var loginHint   = document.getElementById('login-hint');
            var loginBtn    = document.getElementById('login-btn');
            var dismissBtn  = document.getElementById('dismiss-btn');
            var mobileHint     = document.getElementById('mobile-hint');
            var openDialogBtn  = document.getElementById('open-dialog-btn');
            var openBrowserBtn = document.getElementById('open-browser-btn');
            var hintTimer      = null;

            /** Kalender im iframe laden */
            function loadKalender() {
                iframe.src = TARGET_URL + '?_t=' + Date.now();
            }

            /** iframe load-Event: Hinweis ausblenden */
            iframe.addEventListener('load', function () {
                if (hintTimer) {
                    clearTimeout(hintTimer);
                    hintTimer = null;
                }
                loginHint.style.display = 'none';
            });

            /** Anmelden-Button: Öffnet Kalender in neuem Tab */
            loginBtn.addEventListener('click', function (e) {
                e.preventDefault();
                window.open(TARGET_URL, '_blank');
                loginHint.innerHTML =
                    '<div>Nach der Anmeldung hier klicken:</div>' +
                    '<a href="#" id="reload-btn" style="display:inline-block;margin-top:8px;padding:8px 24px;background:#0078d4;color:#fff;border:none;border-radius:4px;font-size:14px;text-decoration:none;cursor:pointer;">Kalender neu laden</a>';
                document.getElementById('reload-btn').addEventListener('click', function (ev) {
                    ev.preventDefault();
                    loginHint.style.display = 'none';
                    loadKalender();
                });
            });

            /** Ausblenden-Button */
            dismissBtn.addEventListener('click', function (e) {
                e.preventDefault();
                loginHint.style.display = 'none';
            });

            // Automatisches Neuladen alle 1 Stunde
            setInterval(function () {
                iframe.src = TARGET_URL + '?_t=' + Date.now();
            }, RELOAD_INTERVAL_MS);

            // Neuladen wenn der Tab wieder sichtbar wird
            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible') {
                    iframe.src = TARGET_URL + '?_t=' + Date.now();
                }
            });

            // Teams SDK initialisieren
            microsoftTeams.app.initialize().then(function () {
                microsoftTeams.app.notifySuccess();

                if (_isMobile) {
                    // Mobile / macOS: Kalender als Dialog innerhalb von Teams öffnen
                    mobileHint.style.display = 'flex';

                    openDialogBtn.addEventListener('click', function (e) {
                        e.preventDefault();
                        // dialog.url.open() öffnet auf Mobile eine vollseitige WebView
                        // (kein iframe) → Entra-Login funktioniert dort
                        if (microsoftTeams.dialog && microsoftTeams.dialog.url &&
                            microsoftTeams.dialog.url.isSupported && microsoftTeams.dialog.url.isSupported()) {
                            microsoftTeams.dialog.url.open(
                                { url: TARGET_URL, title: 'vfm Today Kalender', size: { height: 1000, width: 1000 } }
                            );
                        } else {
                            // Fallback: im System-Browser öffnen
                            microsoftTeams.app.openLink(TARGET_URL);
                        }
                    });

                    // Fallback-Link: im Browser öffnen
                    openBrowserBtn.addEventListener('click', function (e) {
                        e.preventDefault();
                        microsoftTeams.app.openLink(TARGET_URL);
                    });
                } else {
                    // Windows Desktop: Kalender im iframe laden
                    iframe.style.display = 'block';
                    loadKalender();

                    hintTimer = setTimeout(function () {
                        loginHint.style.display = 'block';
                    }, HINT_DELAY);
                }
            });
        })();
    </script>
</body>
</html>
