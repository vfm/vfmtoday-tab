<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vfm Today</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        #login-hint {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 1px solid #e1dfdd;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
            padding: 16px 24px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #323130;
            text-align: center;
            z-index: 100;
            max-width: 400px;
        }
        #login-hint a {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 24px;
            background: #0078d4;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }
        #login-hint a:hover { background: #106ebe; }
        #login-hint .dismiss {
            display: inline-block;
            margin-top: 8px;
            margin-left: 12px;
            padding: 8px 16px;
            background: transparent;
            color: #666;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Kalender-iFrame – wird sofort geladen -->
    <iframe id="content" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>

    <!-- Anmelde-Hinweis (nur bei Bedarf sichtbar) -->
    <div id="login-hint">
        <div>Falls der Kalender nicht angezeigt wird, bitte einmalig anmelden:</div>
        <a id="login-btn" href="#" target="_blank">Anmelden</a>
        <a class="dismiss" id="dismiss-btn" href="#">Ausblenden</a>
    </div>

    <script src="https://res.cdn.office.net/teams-js/2.24.0/js/MicrosoftTeams.min.js"></script>
    <script>
        (function () {
            var RELOAD_INTERVAL_MS = 60 * 60 * 1000; // 1 Stunde
            var TARGET_URL  = 'https://vfmtoday.vfm.de/kalender';
            var HINT_DELAY  = 4000; // Nach 4s Hinweis zeigen

            var iframe    = document.getElementById('content');
            var loginHint = document.getElementById('login-hint');
            var loginBtn  = document.getElementById('login-btn');
            var dismissBtn = document.getElementById('dismiss-btn');

            var hintTimer = null;
            var calendarLoaded = false;

            /** Kalender im iframe laden */
            function loadKalender() {
                iframe.src = TARGET_URL + '?_t=' + Date.now();
            }

            /** Prüfen ob der iframe erfolgreich geladen hat */
            iframe.addEventListener('load', function () {
                // Wenn der iframe geladen hat und die Entra-Session gültig ist,
                // wird der Kalender angezeigt. Da wir wegen Cross-Origin den
                // Inhalt nicht prüfen können, nehmen wir an dass alles OK ist
                // und blenden den Hinweis aus.
                calendarLoaded = true;
                if (hintTimer) {
                    clearTimeout(hintTimer);
                    hintTimer = null;
                }
                loginHint.style.display = 'none';
            });

            /** Anmelden-Button: Öffnet Kalender in neuem Tab */
            loginBtn.addEventListener('click', function (e) {
                e.preventDefault();
                window.open(TARGET_URL, '_blank');
                // Nach dem Anmelden im neuen Tab: Hinweis ändern
                loginHint.innerHTML =
                    '<div>Nach der Anmeldung hier klicken:</div>' +
                    '<a href="#" id="reload-btn" style="display:inline-block;margin-top:8px;padding:8px 24px;background:#0078d4;color:#fff;border:none;border-radius:4px;font-size:14px;text-decoration:none;cursor:pointer;">Kalender neu laden</a>';
                document.getElementById('reload-btn').addEventListener('click', function (ev) {
                    ev.preventDefault();
                    loginHint.style.display = 'none';
                    loadKalender();
                });
            });

            /** Ausblenden-Button */
            dismissBtn.addEventListener('click', function (e) {
                e.preventDefault();
                loginHint.style.display = 'none';
            });

            /** Cache-Bust-Reload des iframes */
            function reloadContent() {
                iframe.src = TARGET_URL + '?_t=' + Date.now();
            }

            // Automatisches Neuladen alle 1 Stunde
            setInterval(reloadContent, RELOAD_INTERVAL_MS);

            // Neuladen wenn der Tab wieder sichtbar wird
            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible') {
                    reloadContent();
                }
            });

            // Teams SDK initialisieren, dann Kalender direkt laden
            microsoftTeams.app.initialize().then(function () {
                microsoftTeams.app.notifySuccess();

                // Kalender sofort im iframe laden
                loadKalender();

                // Nach 4 Sekunden: Falls der iframe leer/blockiert ist,
                // Anmelde-Hinweis einblenden
                hintTimer = setTimeout(function () {
                    loginHint.style.display = 'block';
                }, HINT_DELAY);
            });
        })();
    </script>
</body>
</html>
