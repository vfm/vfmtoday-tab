<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vfm Today</title>
    <script>
        // Nur Windows Desktop nutzt den iframe (WebView2 teilt Edge-Cookies).
        var _isNonWindows = !/Windows NT/i.test(navigator.userAgent || '');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #c8c6c4; background: #1f1f1f; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        #non-win {
            display: none; flex-direction: column; justify-content: center;
            align-items: center; width: 100%; height: 100%; gap: 20px; padding: 24px;
            text-align: center;
        }
        #non-win .title { font-size: 20px; font-weight: 600; color: #e1dfdd; }
        #non-win .btn {
            display: inline-block; padding: 14px 36px; background: #0078d4;
            color: #fff; border: none; border-radius: 6px; font-size: 16px;
            text-decoration: none; cursor: pointer;
        }
        #non-win .btn:hover { background: #106ebe; }
        #non-win .sub { font-size: 13px; color: #999; }
        #non-win .sub a { color: #4da3e0; }
        #login-hint {
            display: none; position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%); background: #292929; border: 1px solid #3b3b3b;
            border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.3);
            padding: 16px 24px; text-align: center; z-index: 100; max-width: 400px;
        }
        #login-hint a {
            display: inline-block; margin-top: 8px; padding: 8px 24px;
            background: #0078d4; color: #fff; border: none; border-radius: 4px;
            font-size: 14px; text-decoration: none; cursor: pointer;
        }
        #login-hint .dismiss {
            display: inline-block; margin-top: 8px; margin-left: 12px;
            padding: 8px 16px; background: transparent; color: #999;
            border: 1px solid #555; border-radius: 4px; font-size: 13px;
            text-decoration: none; cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Windows Desktop: Kalender-iFrame -->
    <iframe id="content" sandbox="allow-scripts allow-same-origin allow-forms" style="display:none;"></iframe>

    <!-- Nicht-Windows: Buttons zum Öffnen im Browser -->
    <div id="non-win">
        <div class="title">vfm Today Kalender</div>
        <a class="btn" href="https://vfmtoday.vfm.de/kalender" target="_blank"
           id="open-btn">Kalender im Browser öffnen</a>
        <div class="sub">Öffnet den Kalender in Safari / Chrome</div>
    </div>

    <!-- Sofort: Auf Nicht-Windows die Buttons zeigen -->
    <script>
        if (_isNonWindows) {
            document.getElementById('non-win').style.display = 'flex';
        }
    </script>

    <!-- Desktop: Anmelde-Hinweis -->
    <div id="login-hint">
        <div>Falls der Kalender nicht angezeigt wird, bitte einmalig anmelden:</div>
        <a id="login-btn" href="#" target="_blank">Anmelden</a>
        <a class="dismiss" id="dismiss-btn" href="#">Ausblenden</a>
    </div>

    <script src="https://res.cdn.office.net/teams-js/2.24.0/js/MicrosoftTeams.min.js"></script>
    <script>
        (function () {
            var TARGET_URL = 'https://vfmtoday.vfm.de/kalender';
            var RELOAD_MS  = 60 * 60 * 1000;
            var HINT_DELAY = 4000;

            var iframe     = document.getElementById('content');
            var loginHint  = document.getElementById('login-hint');
            var loginBtn   = document.getElementById('login-btn');
            var dismissBtn = document.getElementById('dismiss-btn');
            var openBtn    = document.getElementById('open-btn');
            var hintTimer  = null;
            var sdkReady   = false;
            var notified   = false;

            /** NotifySuccess einmalig aufrufen, damit Teams den Spinner entfernt */
            function ensureNotify() {
                if (notified) return;
                notified = true;
                try { microsoftTeams.app.notifySuccess(); } catch (e) {}
            }

            /** Kalender im iframe laden */
            function loadKalender() {
                iframe.src = TARGET_URL + '?_t=' + Date.now();
            }

            // ── Sicherheits-Timeout: notifySuccess nach 2s erzwingen ──
            setTimeout(ensureNotify, 2000);

            // ── Nicht-Windows: Button-Klick ──
            openBtn.addEventListener('click', function (e) {
                // Versuche zuerst app.openLink (öffnet im System-Browser)
                if (sdkReady) {
                    e.preventDefault();
                    microsoftTeams.app.openLink(TARGET_URL);
                }
                // Sonst: normaler <a href target=_blank> Fallback
            });

            // ── Windows: iframe Events / Buttons ──
            iframe.addEventListener('load', function () {
                if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
                loginHint.style.display = 'none';
            });

            loginBtn.addEventListener('click', function (e) {
                e.preventDefault();
                window.open(TARGET_URL, '_blank');
                loginHint.innerHTML =
                    '<div>Nach der Anmeldung hier klicken:</div>' +
                    '<a href="#" id="reload-btn" style="display:inline-block;margin-top:8px;padding:8px 24px;background:#0078d4;color:#fff;border:none;border-radius:4px;font-size:14px;text-decoration:none;cursor:pointer;">Kalender neu laden</a>';
                document.getElementById('reload-btn').addEventListener('click', function (ev) {
                    ev.preventDefault();
                    loginHint.style.display = 'none';
                    loadKalender();
                });
            });

            dismissBtn.addEventListener('click', function (e) {
                e.preventDefault();
                loginHint.style.display = 'none';
            });

            // ── Windows: Auto-Reload ──
            setInterval(function () {
                if (!_isNonWindows) loadKalender();
            }, RELOAD_MS);
            document.addEventListener('visibilitychange', function () {
                if (!_isNonWindows && document.visibilityState === 'visible') loadKalender();
            });

            // ── SDK initialisieren ──
            microsoftTeams.app.initialize().then(function () {
                sdkReady = true;
                ensureNotify();

                if (!_isNonWindows) {
                    iframe.style.display = 'block';
                    loadKalender();
                    hintTimer = setTimeout(function () {
                        loginHint.style.display = 'block';
                    }, HINT_DELAY);
                }
            }).catch(function (err) {
                console.warn('Teams SDK init error:', err);
                ensureNotify();
            });
        })();
    </script>
</body>
</html>
